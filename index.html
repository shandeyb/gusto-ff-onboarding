<!DOCTYPE html><html lang="en"><head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Gusto × Frontier Foundry | PEO Onboarding Hub</title> <link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" /> <script src="https://cdn.tailwindcss.com"></script> <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script> <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script> <style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: "DM Sans", system-ui, sans-serif; background: #F7F4F2; color: #222525; -webkit-font-smoothing: antialiased; } input[type="checkbox"] { accent-color: #0A8080; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; } input[type="checkbox"].guava { accent-color: #F45D48; } .bar { transition: width 0.6s cubic-bezier(.4,0,.2,1); } .card { background: white; border: 1px solid #E8E5E3; border-radius: 14px; transition: box-shadow .15s, transform .15s; } .card:hover { box-shadow: 0 6px 24px rgba(10,128,128,.1); transform: translateY(-1px); } .tab-on { border-bottom: 2.5px solid #0A8080; color: #0A8080; font-weight: 600; } .tab-off { border-bottom: 2.5px solid transparent; color: #7A7C7C; } .tab-off:hover { color: #222525; } .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 100px; font-size: 11px; font-weight: 600; } .tag-u { background:#FEF0EE; color:#F45D48; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; } .tag-d { background:#F7F4F2; color:#7A7C7C; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:500; } .tag-done { background:#E8F4F4; color:#0A8080; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; } .av { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; border:2.5px solid white; box-shadow:0 0 0 2px #E8E5E3; } .rt { fill:none; stroke:#E8E5E3; stroke-width:3; } .rf { fill:none; stroke:#0A8080; stroke-width:3; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1); } ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:#F7F4F2; } ::-webkit-scrollbar-thumb { background:#9DCCCC; border-radius:4px; } /* Edit mode styles */ .ei { border:none; border-bottom:1.5px dashed rgba(10,128,128,.5); background:transparent; outline:none; padding:0 0 2px; font:inherit; color:inherit; cursor:text; width:100%; display:block; } .ei:focus { border-bottom-color:#0A8080; background:rgba(10,128,128,.03); border-radius:2px 2px 0 0; } .eta { border:none; border-bottom:1.5px dashed rgba(10,128,128,.5); background:transparent; outline:none; padding:0 0 2px; font:inherit; color:inherit; cursor:text; width:100%; resize:vertical; display:block; } .eta:focus { border-bottom-color:#0A8080; background:rgba(10,128,128,.03); border-radius:2px 2px 0 0; } .del-btn { background:none; border:none; cursor:pointer; color:#C8C8C8; font-size:16px; padding:0 3px; line-height:1; flex-shrink:0; transition:color .15s; font-family:inherit; } .del-btn:hover { color:#F45D48; } .add-btn { background:none; border:1.5px dashed rgba(10,128,128,.35); border-radius:8px; cursor:pointer; color:#0A8080; font-size:12px; padding:7px 14px; width:100%; text-align:left; margin-top:6px; font-family:inherit; transition:all .15s; } .add-btn:hover { background:rgba(10,128,128,.06); border-color:#0A8080; } </style></head><body><div id="root"></div><script type="text/babel">const { useState, useEffect, useMemo, useContext, createContext } = React;/* ── BRAND ── */const KALE='#0A8080', GUAVA='#F45D48', INK='#222525', WARM='#F7F4F2', PEACH='#FEEEE7';/* ── LOGOS ── */const GustoLogo = ({size=36}) => ( <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style={{display:'block',flexShrink:0}}> <circle cx="50" cy="50" r="50" fill="#F45D48"/> <text x="50" y="59" textAnchor="middle" fill="white" fontFamily="DM Sans,Arial,sans-serif" fontSize="25" fontWeight="600" letterSpacing="-0.5">gusto</text> </svg>);const FFLogo = ({size=36}) => ( <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style={{display:'block',flexShrink:0}}> <circle cx="50" cy="50" r="50" fill="#D0CDB8"/> {/* Outer angular peak */} <path d="M50 22 L74 70 L60 70 L50 45 L40 70 L26 70 Z" fill="#2B2920"/> {/* Inner cutout for faceted/3D effect */} <path d="M50 36 L62 62 L56 62 L50 50 L44 62 L38 62 Z" fill="#D0CDB8"/> </svg>);/* ── MILESTONE ICONS (Gusto coral line-art style) ── */const IconHandshake = ({size=20,color='#F45D48'}) => ( <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"> <path d="m11 17 2 2a1 1 0 1 0 3-3"/> <path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 0-3 3l2 2"/> <path d="m8 9 1.88-1.88a3 3 0 0 1 4.24 0L16 9"/> <path d="M2 8h4v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8Z"/> <path d="M22 8h-4v9a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V8Z"/> </svg>);const IconMailOpen = ({size=20,color='#F45D48'}) => ( <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"> <path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/> <path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"/> </svg>);const IconClipboard = ({size=20,color='#F45D48'}) => ( <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"> <rect width="8" height="4" x="8" y="2" rx="1"/> <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/> <line x1="9" y1="10" x2="15" y2="10"/> <line x1="9" y1="14" x2="15" y2="14"/> <line x1="9" y1="18" x2="13" y2="18"/> </svg>);const IconRocket = ({size=20,color='#F45D48'}) => ( <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"> <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/> <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/> <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/> <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/> </svg>);const IconDollarCircle = ({size=20,color='#F45D48'}) => ( <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"> <circle cx="12" cy="12" r="10"/> <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/> <path d="M12 18V6"/> </svg>);function MilestoneIcon({iconKey, size=18, color='#F45D48'}) { const p = {size, color}; if (iconKey==='handshake') return <IconHandshake {...p}/>; if (iconKey==='mail') return <IconMailOpen {...p}/>; if (iconKey==='clipboard') return <IconClipboard {...p}/>; if (iconKey==='rocket') return <IconRocket {...p}/>; if (iconKey==='dollar') return <IconDollarCircle {...p}/>; return <span style={{fontSize:size}}>{iconKey}</span>;}/* ── EDIT CONTEXT ── */const EditCtx = createContext(false);/* ── MILESTONES (static) ── */const MILESTONES = [ { id:1, label:'Kickoff Meeting', date:'Apr 8', status:'current', iconKey:'handshake', detail:'Meet the team, align on process, and confirm next steps for both sides.' }, { id:2, label:'EE Onboarding Starts', date:'Apr 13', status:'upcoming', iconKey:'mail', detail:'Employee forms sent — I9s, W4s, WSE agreements, and direct deposit.' }, { id:3, label:'All Forms Due', date:'Apr 24', status:'upcoming', iconKey:'clipboard', detail:'All ER and EE paperwork must be completed by this date.' }, { id:5, label:'PEO Live', date:'May 1', status:'upcoming', iconKey:'rocket', detail:'Frontier Foundry officially moves to Gusto PEO.' }, { id:6, label:'First Pay Date', date:'May 8', status:'upcoming', iconKey:'dollar', detail:'First payroll run under Gusto PEO — seamlessly paid to your employees.' },];/* ── DEFAULT DATA ── */const DF_FF = [ { id:'ff1', text:'Confirm meeting cadence: weekly standup or ad hoc email?', due:'Apr 8', urgent:true }, { id:'ff2', text:'Add new company to current Gusto account (live during kickoff)', due:'Apr 8', urgent:true, tutorial: [ 'Log in to your existing Gusto account at gusto.com', 'Click your company name in the top-left corner of the dashboard', 'Select "Add a company" from the dropdown menu', 'Follow the setup wizard — your Gusto Onboarding Lead (Angie) will walk you through this step live during the kickoff call', 'Once added, confirm the new company appears in your account switcher', ] }, { id:'ff3', text:'Sign HR Partner PEO Addendum & upload to Panda', due:'Apr 10', urgent:true, tutorial: [ 'Check your email inbox for a PandaDoc link sent by Gusto (check spam if not found)', 'Open the document and read through the HR Partner PEO Addendum', 'Click the yellow "Sign" field and complete your e-signature', 'Submit the signed document — it will automatically be recorded in PandaDoc', 'Reach out to Angie at Gusto to confirm receipt once signed', ] }, { id:'ff4', text:'Employees: I9 re-verification (for applicable new hires)', due:'Apr 24', urgent:false }, { id:'ff5', text:'Employees: Complete W4 & state tax forms', due:'Apr 24', urgent:false }, { id:'ff6', text:'Employees: Sign Employee Handbook', due:'Apr 24', urgent:false }, { id:'ff7', text:'Employees: Acknowledge WSE (Worksite Employee) agreement', due:'Apr 24', urgent:false }, { id:'ff8', text:'Employees: Authorize direct deposit', due:'Apr 24', urgent:false }, { id:'ff9', text:'Complete Employee Handbook review & verification with Norma', due:'Apr 24', urgent:false }, { id:'ff10', text:'Communicate PEO transition to all employees (Gusto will support)', due:'Before May 1', urgent:false }, { id:'ff11', text:'Input any custom payroll deductions for first PEO cycle', due:'Before May 1', urgent:false }, { id:'ff12', text:'Provide payroll input for first PEO pay period', due:'May 8', urgent:false },];const DF_G = [ { id:'g1', text:'Send post-kickoff recap to Frontier Foundry', due:'Apr 8', urgent:true }, { id:'g2', text:'Bind WC coverage with Key Risk & Libertate', due:'Apr 8', urgent:true }, { id:'g3', text:'Associate company with PEO (rake task)', due:'Apr 8', urgent:true }, { id:'g4', text:'Confirm SUI rate from Texas (Isabel)', due:'Apr 15', urgent:false }, { id:'g5', text:'Migrate customer account to PEO (BOSS migration)', due:'Apr 15', urgent:false }, { id:'g6', text:'Migrate all employee information to PEO account', due:'Apr 15', urgent:false }, { id:'g7', text:'Upload WC confirmation to Panda', due:'Apr 15', urgent:false }, { id:'g8', text:'Notify Frontier Foundry of payroll processing timelines', due:'Apr 15', urgent:false }, { id:'g9', text:'Apply SUTA/FUTA exemptions for employees who have exceeded wage base', due:'Apr 22', urgent:false }, { id:'g10', text:'Update billing to PEO SKU', due:'Apr 24', urgent:false }, { id:'g11', text:'Compliance checklist reviewed & Panda audit complete', due:'Apr 24', urgent:false }, { id:'g12', text:'🚦 Go/No-Go: Confirm all WSEs accepted', due:'Apr 27', urgent:false }, { id:'g13', text:'Update Gusto instance (EIN, co-employment date, retain hire dates)', due:'Apr 28', urgent:false }, { id:'g14', text:'PEO Services Commencement — Frontier Foundry is live!', due:'May 1', urgent:false }, { id:'g15', text:'Release first PEO payroll', due:'May 8', urgent:false },];const DF_TEAM = [ { id:'t1', name:'Alan', role:'Sales Partner', initial:'A', grad:['#CEE6E6','#9DCCCC'], fg:KALE, photo:'img/alan.jpg', desc:'Original connector and point of escalation for any high-level concerns.' }, { id:'t2', name:'Norma', role:'GustoHR Business Partner', initial:'N', grad:['#FDDFDA','#FBBEB6'], fg:GUAVA, photo:'img/norma.jpg', desc:'Main liaison between Frontier Foundry and Gusto PEO. Thought-partner on all things HR, compliance, and business strategy.' }, { id:'t3', name:'Angie', role:'Onboarding Lead', initial:'An', grad:['#CEE6E6','#9DCCCC'], fg:KALE, photo:'img/angie.png', desc:'Your dedicated onboarding contact. Expert in payroll and PEO account transfers.' }, { id:'t4', name:'Sarah J.', role:'Product Partner', initial:'SJ', grad:['#F7F4F2','#EDE9E6'], fg:'#4E5151', photo:'img/sarah.png', desc:'Here to collect your feedback and translate experiences into product improvements.' }, { id:'t5', name:'Sara B.', role:'Product Partner', initial:'SB', grad:['#F7F4F2','#EDE9E6'], fg:'#4E5151', photo:'img/sara.png', desc:'Here to collect your feedback and translate experiences into product improvements.' },];const DF_DP = [ { id:'dp1', n:'01', icon:'💬', title:'Share Honest Feedback', desc:"Your candid input directly shapes what Gusto prioritizes and builds. Tell us what's working and what isn't — no polite nods needed." }, { id:'dp2', n:'02', icon:'🚩', title:'Flag Issues Early', desc:'If something feels off — in the product, a process, or a communication — let us know right away so we can fix it fast.' }, { id:'dp3', n:'03', icon:'🔬', title:'Partner on Research', desc:'Join periodic interviews and feedback sessions. This is an ongoing dialogue, not a one-way demo.' }, { id:'dp4', n:'04', icon:'🎯', title:'Be a Sounding Board', desc:'We may share early concepts or prototypes for your reaction. Your gut response is genuinely valuable.' },];const DF_POST_FF = [ 'Semi-monthly and off-cycle payroll inputs and changes', 'New hires (work location must be in Texas)', "Separations & terminations (with Norma's guidance as needed)", 'Leave handling and reporting', "Workers' Comp claims and notifications to Gusto", 'EEO-1 reporting',];const DF_POST_G = [ 'Quarterly Tax Filings & Tax Remittances', 'Audits and compliance checkpoints', 'Monitoring of Federal, State, and Local laws', 'Annual handbook refresh and mandatory trainings', "Workers' Compensation claims support and carrier notifications", 'Timely payroll release and off-cycle support', 'Renewal rates and recommendations', 'State expansion and employee classification changes',];const DF_QS = [ { id:'q1', q:'Meeting cadence', detail:'Weekly standup with Angie/Norma, or ad hoc via email until first payroll?' }, { id:'q2', q:'Employee comms owner', detail:'Who at Frontier Foundry will own the PEO transition announcement to employees?' }, { id:'q3', q:'Contractors in scope?', detail:'Any contractors currently in Gusto that should be scoped into this transition?' },];const DF_CRIT = [ { id:'c1', date:'Apr 8', label:'Kickoff Meeting', status:'current', note:'Today' }, { id:'c2', date:'Apr 10', label:'HR Partner PEO Addendum due', status:'soon', note:'2 days' }, { id:'c3', date:'Apr 13', label:'Employee Onboarding Starts', status:'upcoming', note:'5 days' }, { id:'c4', date:'Apr 24', label:'All ER + EE Forms Due', status:'upcoming', note:'16 days' }, { id:'c5', date:'Apr 27', label:'Go / No-Go Review', status:'upcoming', note:'19 days' }, { id:'c6', date:'Apr 30', label:'Onboarding Completed', status:'upcoming', note:'22 days' }, { id:'c7', date:'May 1', label:'PEO Services Commencement', status:'upcoming', note:'23 days' }, { id:'c8', date:'May 8', label:'First Pay Date', status:'upcoming', note:'30 days' },];/* ── PERSIST ── */const STORE = 'gusto-ff-onboarding-v2';function load() { try { const s = localStorage.getItem(STORE); return s ? JSON.parse(s) : null; } catch(e) { return null; }}/* ── CHECKLIST COMPONENT ── */function Checklist({ tasks, setTasks, checked, setChecked, color, label, sub, mark }) { const em = useContext(EditCtx); const done = Object.values(checked).filter(Boolean).length; const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0; const [expandedTutorial, setExpandedTutorial] = useState(null); const updTask = (id, field, val) => setTasks(p => p.map(t => t.id===id ? {...t, [field]:val} : t)); const delTask = (id) => setTasks(p => p.filter(t => t.id!==id)); const addTask = () => setTasks(p => [...p, { id:'new'+Date.now(), text:'New task', due:'TBD', urgent:false }]); return ( <div style={{background:'white',borderRadius:16,overflow:'hidden',border:'1px solid #E8E5E3'}}> {/* Header */} <div style={{padding:'18px 20px',background:`linear-gradient(135deg,${color},${color}CC)`}}> <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}> {mark==='FF' ? <FFLogo size={26}/> : <GustoLogo size={26}/>} <div style={{fontFamily:'"Song Myung",serif',fontSize:17,color:'white'}}>{label}</div> </div> <div style={{fontSize:12,color:'rgba(255,255,255,.8)',marginBottom:12}}>{sub}</div> <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'rgba(255,255,255,.7)',marginBottom:6}}> <span>{done} of {tasks.length} complete</span><span>{pct}%</span> </div> <div style={{height:5,background:'rgba(255,255,255,.3)',borderRadius:100,overflow:'hidden'}}> <div className="bar" style={{height:'100%',background:'white',borderRadius:100,width:`${pct}%`}}/> </div> </div> {/* Tasks */} <div style={{padding:'8px',maxHeight:em?'none':460,overflowY:em?'visible':'auto'}}> {tasks.map(t => ( <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'9px 12px',borderRadius:10,marginBottom:2,transition:'background .1s'}} onMouseEnter={e=>{ if(!em) e.currentTarget.style.background=color+'14'; }} onMouseLeave={e=>{ if(!em) e.currentTarget.style.background='transparent'; }}> {!em && ( <input type="checkbox" className={color===GUAVA?'guava':''} style={{marginTop:3}} checked={!!checked[t.id]} onChange={()=>setChecked(p=>({...p,[t.id]:!p[t.id]}))}/> )} <di
